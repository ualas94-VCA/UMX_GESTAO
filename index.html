<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMX Gestão v3.1 | Professional SaaS Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s ease; }
        #main-content { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-toast { animation: slideInRight 0.3s ease-out; }

        /* Estilo de Impressão Térmica */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; 
                font-family: 'Courier New', Courier, monospace !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen overflow-x-hidden">

    <div id="sidebar-overlay" onclick="UI.toggleSidebar(false)" class="fixed inset-0 bg-slate-900/50 z-40 hidden opacity-0 transition-opacity lg:hidden"></div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-[#1e293b] text-slate-300 z-50 w-64 lg:w-64 overflow-hidden flex flex-col shadow-2xl">
        <div class="p-6 flex items-center gap-3 border-b border-slate-700 shrink-0 h-[73px]">
            <div id="app-logo" onclick="Actions.triggerAdmin()" class="bg-blue-600 p-2 rounded-lg text-white font-bold cursor-pointer select-none">UX</div>
            <span class="text-xl font-bold text-white tracking-tight sidebar-text">UMX <span class="text-blue-500">Gestão</span></span>
        </div>

        <nav class="flex-1 mt-4 px-3 space-y-1 overflow-y-auto no-scrollbar">
            <button onclick="UI.nav('dashboard')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">📊 <span class="sidebar-text font-medium">Dashboard</span></button>
            <button onclick="UI.nav('clientes')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">👥 <span class="sidebar-text font-medium">Clientes</span></button>
            <button onclick="UI.nav('produtos')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">📦 <span class="sidebar-text font-medium">Produtos</span></button>
            <button onclick="UI.nav('servicos')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">🛠️ <span class="sidebar-text font-medium">Serviços</span></button>
            <button onclick="UI.nav('os')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">📄 <span class="sidebar-text font-medium">Ordens de Serviço</span></button>
            <button onclick="UI.nav('financeiro')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 hover:text-white transition group">💰 <span class="sidebar-text font-medium">Financeiro</span></button>
        </nav>

        <div class="p-4 border-t border-slate-700 bg-slate-800/40 shrink-0">
            <div id="license-badge" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-wider"></div>
        </div>
    </aside>

    <main id="main-content" class="lg:ml-64 min-h-screen flex flex-col">
        <header class="sticky top-0 z-30 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 lg:px-8 py-3 flex justify-between items-center h-[73px]">
            <div class="flex items-center gap-4">
                <button onclick="UI.toggleSidebar()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-xl">☰</button>
                <h1 id="page-title" class="text-lg font-bold text-slate-800 dark:text-white">Dashboard</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="UI.toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 transition">🌓</button>
                <div id="user-avatar" class="h-10 w-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs shadow-lg">AD</div>
            </div>
        </header>
        <div id="viewport" class="p-4 lg:p-8 flex-1 max-w-7xl mx-auto w-full"></div>
    </main>

    <div id="toast-container" class="fixed top-6 right-6 z-[100] space-y-3"></div>
    <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all">
        <div class="bg-white dark:bg-darkCard w-full max-w-2xl rounded-3xl shadow-2xl relative overflow-hidden transform scale-95 opacity-0 transition-all duration-200" id="modal-box">
            <button onclick="UI.closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-red-500 transition text-2xl font-bold">✕</button>
            <div id="modal-content" class="p-8 max-h-[90vh] overflow-y-auto"></div>
        </div>
    </div>
    <div id="print-area" class="hidden"></div>

    <script>
        const State = {
            clientes: [], produtos: [], servicos: [], os: [], transacoes: [],
            config: null, chartInstance: null, isMini: false, currentUser: null
        };

        const DB = {
            name: "UMX_Gestao_v3", version: 1, handle: null,
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.name, this.version);
                    request.onsuccess = (e) => { this.handle = e.target.result; resolve(true); };
                    request.onerror = () => reject("Erro ao abrir Banco de Dados");
                });
            },
            async getAll(store) {
                const tx = this.handle.transaction(store, "readonly");
                return new Promise(r => tx.objectStore(store).getAll().onsuccess = e => r(e.target.result));
            },
            async get(store, key) {
                const tx = this.handle.transaction(store, "readonly");
                return new Promise(r => tx.objectStore(store).get(key).onsuccess = e => r(e.target.result));
            },
            async put(store, data) {
                const tx = this.handle.transaction(store, "readwrite");
                return new Promise(r => tx.objectStore(store).put(data).onsuccess = () => r(true));
            },
            async delete(store, key) {
                const tx = this.handle.transaction(store, "readwrite");
                return new Promise(r => tx.objectStore(store).delete(key).onsuccess = () => r(true));
            }
        };

        const Service = {
            async loadAllState() {
                State.clientes = await DB.getAll("clientes");
                State.produtos = await DB.getAll("produtos");
                State.servicos = await DB.getAll("servicos");
                State.os = await DB.getAll("os");
                State.transacoes = await DB.getAll("transacoes");
                State.config = await DB.get("config", "app_license");
            },
            async finalizeOS(osId) {
                if (window._processingOS) return;
                window._processingOS = true;
                
                try {
                    const os = await DB.get("os", osId);
                    if (!os || os.status === 'Finalizada') throw "Operação inválida.";

                    const tx = DB.handle.transaction(["os", "produtos", "transacoes"], "readwrite");
                    for (const item of os.itensProdutos) {
                        const product = await new Promise(r => tx.objectStore("produtos").get(item.id).onsuccess = e => r(e.target.result));
                        if (product.estoqueAtual < item.qtd) throw `Estoque insuficiente para: ${item.nome}`;
                        product.estoqueAtual -= item.qtd;
                        tx.objectStore("produtos").put(product);
                    }
                    tx.objectStore("transacoes").add({ tipo: 'entrada', origem: 'OS', osId: os.id, descricao: `Recebimento OS #${os.id}`, valor: os.total, data: Date.now(), status: 'pago' });
                    os.status = 'Finalizada'; os.dataFechamento = Date.now();
                    tx.objectStore("os").put(os);
                    
                    return new Promise((r, j) => { tx.oncomplete = () => r(true); tx.onerror = () => j("Erro na transação."); });
                } catch (err) { throw err; } finally { window._processingOS = false; }
            },
            checkLicense() {
                if (!State.config) return { status: 'expirada', label: '🔴 Sem Licença' };
                const dias = Math.ceil((State.config.dataExpiracao - Date.now()) / (1000 * 60 * 60 * 24));
                if (dias <= 0) return { status: 'expirada', label: '🔴 Licença Expirada' };
                return { status: 'ativa', label: dias <= 30 ? `🟡 Expira em ${dias}d` : `🟢 Licença Ativa` };
            }
        };

        const UI = {
            async init() {
                await DB.init();
                
                // Restauração de Sessão (Incisão 4)
                const savedUser = sessionStorage.getItem("umx_user_session");
                if (savedUser) {
                    State.currentUser = JSON.parse(savedUser);
                    document.getElementById('user-avatar').innerText = State.currentUser.doc.substring(0,2).toUpperCase();
                }

                await Service.loadAllState();
                if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
                this.updateLicenseBadge();
                this.nav('dashboard');
                window.addEventListener('resize', () => this.handleResize());
            },
            handleResize() {
                const sb = document.getElementById('sidebar');
                if (window.innerWidth < 1024) sb.classList.add('-translate-x-full');
                else sb.classList.remove('-translate-x-full');
            },
            nav(view) {
                if (State.chartInstance) { State.chartInstance.destroy(); State.chartInstance = null; }
                document.getElementById('page-title').innerText = view.charAt(0).toUpperCase() + view.slice(1);
                document.getElementById('viewport').innerHTML = UI.views[view] ? UI.views[view]() : '';
                if (view === 'dashboard') this.renderDashChart();
                if (window.innerWidth < 1024) this.toggleSidebar(false);
            },
            updateLicenseBadge() {
                const lic = Service.checkLicense();
                document.getElementById('license-badge').innerHTML = `<span class="h-2 w-2 rounded-full ${lic.status === 'ativa' ? 'bg-green-500' : 'bg-red-500'} animate-pulse"></span> ${lic.label}`;
            },
            toggleSidebar(force) {
                const sb = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                const main = document.getElementById('main-content');
                if (window.innerWidth >= 1024) {
                    State.isMini = !State.isMini;
                    sb.style.width = State.isMini ? '80px' : '256px';
                    main.style.marginLeft = State.isMini ? '80px' : '256px';
                    document.querySelectorAll('.sidebar-text').forEach(el => el.classList.toggle('hidden', State.isMini));
                } else {
                    const open = force !== undefined ? force : sb.classList.contains('-translate-x-full');
                    sb.classList.toggle('-translate-x-full', !open);
                    overlay.classList.toggle('hidden', !open);
                    setTimeout(() => overlay.classList.toggle('opacity-100', open), 10);
                }
            },
            toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; },
            toast(msg, type = 'success') {
                const c = document.getElementById('toast-container');
                const e = document.createElement('div');
                e.className = `${type === 'success' ? 'bg-blue-600' : 'bg-red-600'} text-white px-6 py-4 rounded-2xl shadow-2xl animate-toast flex items-center gap-3`;
                e.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
                c.appendChild(e);
                setTimeout(() => { e.style.opacity = '0'; setTimeout(() => e.remove(), 500); }, 4000);
            },
            openModal(html) {
                const c = document.getElementById('modal-container');
                const b = document.getElementById('modal-box');
                document.getElementById('modal-content').innerHTML = html;
                c.classList.remove('hidden');
                setTimeout(() => b.classList.replace('opacity-0', 'opacity-100'), 10);
            },
            closeModal() {
                const c = document.getElementById('modal-container');
                const b = document.getElementById('modal-box');
                b.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => c.classList.add('hidden'), 200);
            },
            renderDashChart() {
                const ctx = document.getElementById('chartDashboard');
                if (ctx) State.chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['S1','S2','S3','S4'], datasets: [{ label: 'Vendas', data: [400, 800, 600, 1000], borderColor: '#2563eb', tension: 0.4 }] }, options: { maintainAspectRatio: false } });
            },
            views: {
                dashboard() {
                    return `<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white dark:bg-darkCard p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Saldo Financeiro</p>
                            <h3 class="text-2xl font-bold mt-2 text-blue-600">R$ ${State.transacoes.reduce((a,c)=>c.tipo==='entrada'?a+c.valor:a-c.valor,0).toFixed(2)}</h3>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-darkCard p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm h-80">
                        <canvas id="chartDashboard"></canvas>
                    </div>`;
                },
                clientes() { return `<div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Clientes</h2> <button onclick="Actions.openForm('cliente')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">+ Novo Cliente</button> </div> <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm"> <table class="w-full text-left"> <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"> <tr><th class="p-4">Nome</th><th class="p-4">CPF/CNPJ</th><th class="p-4">Ação</th></tr> </thead> <tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.clientes.map(c=>`<tr><td class="p-4 font-bold">${c.nome}</td><td class="p-4">${c.cpfCnpj}</td><td class="p-4"><button onclick="Actions.deleteItem('clientes',${c.id})">🗑️</button></td></tr>`).join('')}</tbody> </table> </div>`; },
                produtos() { return `<div class="flex justify-between mb-6"><h2 class="text-2xl font-bold">Produtos</h2><button onclick="Actions.openForm('produto')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">+ Novo Produto</button></div> <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"><tr><th class="p-4">Descrição</th><th class="p-4">Estoque</th><th class="p-4">Ação</th></tr></thead><tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.produtos.map(p=>`<tr><td class="p-4 font-bold">${p.nome}</td><td class="p-4">${p.estoqueAtual}</td><td class="p-4"><button onclick="Actions.deleteItem('produtos',${p.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`; },
                os() { return `<div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Ordens de Serviço</h2> <button onclick="Actions.openForm('os')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/30">+ Abrir OS</button> </div> <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden"> <table class="w-full text-left"> <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"> <tr> <th class="px-6 py-4">Nº OS</th> <th class="px-6 py-4">Cliente</th> <th class="px-6 py-4">Status</th> <th class="px-6 py-4 text-right">Ações</th> </tr> </thead> <tbody class="divide-y divide-slate-100 dark:divide-slate-800"> ${State.os.map(o => `<tr> <td class="px-6 py-4 font-bold">#${o.id}</td> <td class="px-6 py-4">${State.clientes.find(c=>c.id==o.clienteId)?.nome || '---'}</td> <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${o.status=='Finalizada'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}">${o.status}</span></td> <td class="px-6 py-4 text-right flex justify-end gap-2"> ${o.status=='Aberta'?`<button onclick="Actions.finalizeOS(${o.id})" class="text-green-500">✅</button>`:''} <button onclick="Actions.printOS(${o.id})">🖨️</button> </td> </tr>`).join('')} </tbody> </table> </div>`; },
                financeiro() { return `<div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm p-6"><h2 class="text-xl font-bold mb-4">Lançamentos</h2><div class="space-y-2">${State.transacoes.map(t=>`<div class="flex justify-between p-3 border-b dark:border-slate-800"><span>${t.descricao}</span><span class="font-bold ${t.tipo=='entrada'?'text-green-500':'text-red-500'}">R$ ${t.valor.toFixed(2)}</span></div>`).join('')}</div></div>`; },
                servicos() { return `<div class="flex justify-between mb-6"><h2 class="text-2xl font-bold">Serviços</h2><button onclick="Actions.openForm('servico')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">+ Novo Serviço</button></div> <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"><tr><th class="p-4">Serviço</th><th class="p-4">Valor</th><th class="p-4">Ação</th></tr></thead><tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.servicos.map(s=>`<tr><td class="p-4 font-bold">${s.nome}</td><td class="p-4">R$ ${s.valorPadrao}</td><td class="p-4"><button onclick="Actions.deleteItem('servicos',${s.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`; }
            }
        };

        const Actions = {
            clicksLogo: 0,
            triggerAdmin() { this.clicksLogo++; if (this.clicksLogo === 3) { this.clicksLogo = 0; this.openForm('admin_licenca'); } setTimeout(() => this.clicksLogo = 0, 2000); },
            async finalizeOS(id) { 
                try { 
                    await Service.finalizeOS(id); 
                    UI.toast("OS Finalizada!"); await Service.loadAllState(); UI.nav('os'); 
                } catch(e) { UI.toast(e, 'error'); } 
            },
            async deleteItem(s, id) { if (confirm("Excluir?")) { await DB.delete(s, id); await Service.loadAllState(); UI.nav(UI.currentView); } },
            openForm(type) {
                let h = "";
                if(type=='cliente') h = `<h2 class="text-xl font-bold mb-4">Novo Cliente</h2><input id="f-nome" placeholder="Nome" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="f-doc" placeholder="CPF/CNPJ" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.saveCliente()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>`;
                if(type=='produto') h = `<h2 class="text-xl font-bold mb-4">Novo Produto</h2><input id="f-nome" placeholder="Nome" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="f-estoque" type="number" placeholder="Estoque" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.saveProd()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>`;
                if(type=='os') h = `<h2 class="text-xl font-bold mb-4">Abrir OS</h2><select id="os-cliente" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4">${State.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select><button onclick="Actions.saveOS()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Abrir OS</button>`;
                if(type=='admin_licenca') h = `<h2 class="text-xl font-bold mb-4">Ativar Licença</h2><input id="adm-doc" placeholder="CPF/CNPJ" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="adm-key" placeholder="Chave de Ativação" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.activateLicense()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Ativar</button>`;
                UI.openModal(h);
            },
            async saveCliente() { const n=document.getElementById('f-nome').value, d=document.getElementById('f-doc').value; await DB.put("clientes", {nome:n, cpfCnpj:d, status:'ativo'}); UI.closeModal(); await Service.loadAllState(); UI.nav('clientes'); },
            async saveProd() { const n=document.getElementById('f-nome').value, e=parseInt(document.getElementById('f-estoque').value); await DB.put("produtos", {nome:n, estoqueAtual:e, precoVenda:10, estoqueMinimo:5, unidade:'un'}); UI.closeModal(); await Service.loadAllState(); UI.nav('produtos'); },
            
            // INCISÃO 3: Lock Visual no FinalizarVenda (SaveOS)
            async saveOS() {
                if (window._processingOS) return;
                window._processingOS = true;
                const btn = document.querySelector('button[onclick="Actions.saveOS()"]');
                if (btn) { btn.disabled = true; btn.innerText = "Processando..."; }

                try {
                    const cid = parseInt(document.getElementById('os-cliente').value);
                    const os = {
                        clienteId: cid, dataAbertura: Date.now(), 
                        created_at: new Date().toISOString(), // INCISÃO 1
                        status: 'Aberta', itensProdutos: [], itensServicos: [], total: 0
                    };
                    await DB.put("os", os);
                    UI.toast("OS Aberta!");
                    UI.closeModal();
                    await Service.loadAllState();
                    UI.nav('os');
                } catch(e) { UI.toast("Erro ao salvar", "error"); }
                finally { window._processingOS = false; }
            },

            // INCISÃO 5: Impressão Térmica Texto Puro 40 Colunas
            printOS(id) {
                if (window._printing) return;
                window._printing = true;

                const os = State.os.find(o => o.id == id);
                const cli = State.clientes.find(c => c.id == os.clienteId);
                const area = document.getElementById('print-area');
                
                const pad = (s, l) => s.toString().substring(0, l).padEnd(l, ' ');
                const padR = (s, l) => s.toString().substring(0, l).padStart(l, ' ');
                const line = "-".repeat(40);

                let txt = "";
                txt += "            UMX GESTAO v3.1             \n";
                txt += "       SOLUCOES EM TECNOLOGIA          \n";
                txt += line + "\n";
                txt += `OS NUMERO: #${pad(os.id, 28)}\n`;
                txt += `DATA: ${pad(new Date(os.dataAbertura).toLocaleDateString(), 32)}\n`;
                txt += `CLIENTE: ${pad(cli ? cli.nome : 'CONSUMIDOR', 31)}\n`;
                txt += line + "\n";
                txt += "ITEM             QTD       VALOR (RS)   \n";
                os.itensProdutos.forEach(p => { txt += `${pad(p.nome, 16)} ${pad(p.qtd, 4)} ${padR(p.preco.toFixed(2), 12)}\n`; });
                txt += line + "\n";
                txt += `TOTAL: ${padR(os.total.toFixed(2), 33)}\n`;
                txt += line + "\n";
                txt += "      OBRIGADO PELA PREFERENCIA!        \n\n\n\n";

                area.innerHTML = `<pre style="font-family:'Courier New', monospace; font-size:12px; line-height:1.2;">${txt}</pre>`;
                window.print();
                setTimeout(() => { window._printing = false; }, 2000);
            },

            // INCISÃO: Validação de Licença com Checksum
            async activateLicense() {
                const doc = document.getElementById('adm-doc').value.replace(/\D/g, '');
                const key = document.getElementById('adm-key').value.toUpperCase();

                // Checksum cirúrgico: Base64 do doc truncado em 8 caracteres
                const expected = btoa(doc).substring(0, 8).toUpperCase();

                if (key !== expected) {
                    UI.toast("Chave de Ativação Inválida!", "error");
                    console.warn("Dica Admin - Chave para este DOC:", expected);
                    return;
                }

                const lic = { key: "app_license", documento: doc, dataInicio: Date.now(), dataExpiracao: Date.now() + (365*24*60*60*1000) };
                await DB.put("config", lic);
                
                // Salva Sessão (Incisão 4)
                sessionStorage.setItem("umx_user_session", JSON.stringify({ nome: "Admin", doc: doc }));
                
                UI.toast("Ativado!");
                UI.closeModal(); await Service.loadAllState(); UI.updateLicenseBadge(); UI.nav('dashboard');
            }
        };

        document.addEventListener('DOMContentLoaded', () => UI.init());
    </script>
</body>
</html>
