<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMX Gestão v3.4 | Professional SaaS Hybrid</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: width 0.3s ease, transform 0.3s ease; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; font-family: monospace; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">

    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-[#1e293b] text-slate-300 z-50 w-64 overflow-hidden flex flex-col shadow-2xl">
        <div class="p-6 flex items-center gap-3 border-b border-slate-700 h-[73px]">
            <div id="app-logo" onclick="Actions.triggerAdmin()" class="bg-blue-600 p-2 rounded-lg text-white font-bold cursor-pointer">UX</div>
            <span class="text-xl font-bold text-white sidebar-text">UMX Gestão</span>
        </div>
        <nav class="flex-1 mt-4 px-3 space-y-1">
            <button onclick="UI.nav('dashboard')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">📊 Dashboard</button>
            <button onclick="UI.nav('clientes')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">👥 Clientes</button>
            <button onclick="UI.nav('produtos')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">📦 Produtos</button>
            <button onclick="UI.nav('servicos')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">🛠️ Serviços</button>
            <button onclick="UI.nav('os')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">📄 OS</button>
            <button onclick="UI.nav('financeiro')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">💰 Financeiro</button>
            <button onclick="UI.nav('config')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 transition">⚙️ Configurações</button>
        </nav>
        <div id="license-badge" class="p-4 text-[10px] font-bold uppercase border-t border-slate-700"></div>
    </aside>

    <main id="main-content" class="lg:ml-64 min-h-screen flex flex-col">
        <header class="sticky top-0 z-30 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-8 py-3 flex justify-between items-center h-[73px]">
            <div class="flex items-center gap-4">
                <button onclick="UI.toggleSidebar()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-xl lg:hidden">☰</button>
                <h1 id="page-title" class="text-lg font-bold">Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="sync-indicator" class="text-[10px] font-bold text-slate-400">OFFLINE</span>
                <button onclick="UI.toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800">🌓</button>
            </div>
        </header>
        <div id="viewport" class="p-4 lg:p-8 flex-1 max-w-7xl mx-auto w-full"></div>
    </main>

    <div id="toast-container" class="fixed top-6 right-6 z-[100] space-y-3"></div>
    <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkCard w-full max-w-2xl rounded-3xl p-8 relative max-h-[90vh] overflow-y-auto" id="modal-box">
            <button onclick="UI.closeModal()" class="absolute top-5 right-5 text-2xl">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>
    <div id="print-area" class="hidden"></div>

    <script>
        /**
         * UMX GESTÃO v3.4 - MOTOR SaaS HÍBRIDO + CRUD RESTAURADO
         */
        
        const State = { 
            clientes: [], produtos: [], servicos: [], os: [], transacoes: [], 
            config: null, chartInstance: null,
            empresa_id: localStorage.getItem('umx_empresa_id') || "999",
            lastSync: null // INDICADOR DE SYNC MELHORADO
        };

        const syncMetadata = (obj) => ({
            ...obj,
            created_at: obj.created_at || new Date().toISOString(),
            updated_at: new Date().toISOString(),
            sync_status: 0
        });

        const DB = {
            name: "UMX_Gestao_v3", version: 1, handle: null,
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.name, this.version);
                    
                    // CORREÇÃO 1: INDEXEDDB UPGRADENEEDED CIRÚRGICO
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        const stores = ["clientes", "produtos", "servicos", "os", "transacoes"];
                        stores.forEach(s => {
                            if (!db.objectStoreNames.contains(s)) {
                                db.createObjectStore(s, { keyPath: "id", autoIncrement: true });
                            }
                        });
                        if (!db.objectStoreNames.contains("config")) {
                            db.createObjectStore("config", { keyPath: "key" });
                        }
                    };

                    req.onsuccess = (e) => { this.handle = e.target.result; resolve(true); };
                    req.onerror = () => reject("Erro DB");
                });
            },
            async getAll(storeName) {
                return new Promise(r => {
                    const tx = this.handle.transaction(storeName, "readonly");
                    tx.objectStore(storeName).getAll().onsuccess = e => r(e.target.result);
                });
            },
            async get(storeName, key) {
                return new Promise(r => {
                    const tx = this.handle.transaction(storeName, "readonly");
                    tx.objectStore(storeName).get(key).onsuccess = e => r(e.target.result);
                });
            },
            async put(storeName, data) {
                const tx = this.handle.transaction(storeName, "readwrite");
                return new Promise(r => tx.objectStore(storeName).put(data).onsuccess = () => r(true));
            },
            async delete(storeName, key) {
                const tx = this.handle.transaction(storeName, "readwrite");
                return new Promise(r => tx.objectStore(storeName).delete(key).onsuccess = () => r(true));
            },

            // CORREÇÃO 2: IMPLEMENTAÇÃO DO EXPORT/BACKUP
            async exportDatabase() {
                const backup = {};
                const stores = ["clientes", "produtos", "servicos", "os", "transacoes", "config"];
                for (const store of stores) {
                    backup[store] = await this.getAll(store);
                }
                const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "backup_umx.json";
                a.click();
                URL.revokeObjectURL(url);
            }
        };

        const Service = {
            async loadAllState() {
                State.clientes = await DB.getAll("clientes");
                State.produtos = await DB.getAll("produtos");
                State.servicos = await DB.getAll("servicos");
                State.os = await DB.getAll("os");
                State.transacoes = await DB.getAll("transacoes");
            },

            async finalizeOS(osId) {
                if (window._processingOS) return;
                window._processingOS = true;
                
                try {
                    const os = await DB.get("os", osId);
                    if (!os || os.status === 'Finalizada') throw "Operação inválida.";

                    const tx = DB.handle.transaction(["os", "produtos", "transacoes"], "readwrite");
                    for (const item of (os.itensProdutos || [])) {
                        const product = await new Promise(r => tx.objectStore("produtos").get(item.id).onsuccess = e => r(e.target.result));
                        if (product.estoqueAtual < item.qtd) throw `Estoque insuficiente: ${item.nome}`;
                        product.estoqueAtual -= item.qtd;
                        tx.objectStore("produtos").put(product);
                    }
                    tx.objectStore("transacoes").add(syncMetadata({ tipo: 'entrada', origem: 'OS', osId: os.id, descricao: `Recebimento OS #${os.id}`, valor: os.total, data: Date.now() }));
                    
                    os.status = 'Finalizada'; 
                    os.dataFechamento = Date.now();
                    os.updated_at = new Date().toISOString();
                    os.sync_status = 0; // Marca para re-sincronizar alteração
                    tx.objectStore("os").put(os);
                    
                    return new Promise((r, j) => { tx.oncomplete = () => r(true); tx.onerror = () => j("Erro na transação."); });
                } catch (err) { throw err; } finally { window._processingOS = false; }
            },

            async syncData() {
                // CORREÇÃO 3: PROTEÇÃO CONTRA MÚLTIPLOS SYNCS
                if (window._syncing) return;

                const indicator = document.getElementById('sync-indicator');
                if (!navigator.onLine) {
                    indicator.innerText = "OFFLINE";
                    indicator.className = "text-[10px] font-bold text-red-500";
                    return;
                }

                window._syncing = true;
                indicator.innerText = "SINCRONIZANDO...";
                indicator.className = "text-[10px] font-bold text-blue-500 animate-pulse";

                try {
                    const pendentes = {
                        vendas: (await DB.getAll("os")).filter(x => x.sync_status === 0),
                        clientes: (await DB.getAll("clientes")).filter(x => x.sync_status === 0),
                        produtos: (await DB.getAll("produtos")).filter(x => x.sync_status === 0),
                        transacoes: (await DB.getAll("transacoes")).filter(x => x.sync_status === 0)
                    };

                    const total = Object.values(pendentes).flat().length;
                    if (total === 0) {
                        indicator.innerText = State.lastSync ? `NUVEM OK (${State.lastSync})` : "NUVEM OK";
                        indicator.className = "text-[10px] font-bold text-green-500";
                        window._syncing = false;
                        return;
                    }

                    // CORREÇÃO 4: TIMEOUT DE API (10 segundos)
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);

                    const response = await fetch('https://sua-api.com/v1/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ empresa_id: State.empresa_id, ...pendentes }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (response.ok) {
                        for (const store in pendentes) {
                            for (const item of pendentes[store]) {
                                item.sync_status = 1;
                                await DB.put(store === 'vendas' ? 'os' : store, item);
                            }
                        }
                        State.lastSync = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); // FASE 5
                        indicator.innerText = `NUVEM OK (${State.lastSync})`;
                        indicator.className = "text-[10px] font-bold text-green-500";
                    } else {
                        throw new Error("API retornou erro");
                    }
                } catch (e) {
                    console.error("Erro Sync:", e);
                    indicator.innerText = "ERRO SYNC";
                    indicator.className = "text-[10px] font-bold text-red-500";
                } finally {
                    window._syncing = false;
                }
            }
        };

        const UI = {
            async init() {
                // FASE 6: PREPARAÇÃO PARA PWA
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('service-worker.js').catch(err => console.log("SW Falhou:", err));
                }

                await DB.init();
                await Service.loadAllState();
                this.nav('dashboard');
                
                // CORREÇÃO 5: PROTEÇÃO DE ESTOQUE ROBUSTA
                State.produtos.forEach(p => {
                    if (p.estoqueAtual !== undefined && p.estoqueAtual < (p.estoqueMinimo || 5)) 
                        this.toast(`Estoque baixo: ${p.nome} (${p.estoqueAtual}un)`, "error");
                });

                setInterval(() => Service.syncData(), 60000);
                Service.syncData(); 
            },
            nav(view) {
                if (State.chartInstance) { State.chartInstance.destroy(); State.chartInstance = null; }
                document.getElementById('page-title').innerText = view.toUpperCase();
                document.getElementById('viewport').innerHTML = this.views[view] ? this.views[view]() : '';
                if (view === 'dashboard') this.renderDashChart();
                if (window.innerWidth < 1024) this.toggleSidebar(false);
            },
            toast(msg, type = 'success') {
                const c = document.getElementById('toast-container');
                const e = document.createElement('div');
                e.className = `${type === 'success' ? 'bg-blue-600' : 'bg-orange-500'} text-white px-6 py-4 rounded-2xl shadow-xl`;
                e.innerText = msg;
                c.appendChild(e);
                setTimeout(() => e.remove(), 4000);
            },
            toggleTheme() { document.documentElement.classList.toggle('dark'); },
            toggleSidebar(force) {
                const sb = document.getElementById('sidebar');
                const open = force !== undefined ? force : sb.classList.contains('-translate-x-full');
                sb.classList.toggle('-translate-x-full', !open);
            },
            closeModal() { document.getElementById('modal-container').classList.add('hidden'); },
            renderDashChart() {
                const ctx = document.getElementById('chartDashboard');
                if (ctx) State.chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['S1','S2','S3','S4'], datasets: [{ label: 'Vendas', data: [400, 800, 600, 1000], borderColor: '#2563eb', tension: 0.4 }] }, options: { maintainAspectRatio: false } });
            },

            // FASE 3: RESTAURAÇÃO DAS ABAS (Views completas da v3.1)
            views: {
                dashboard: () => `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white dark:bg-darkCard p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Saldo Financeiro</p>
                            <h3 class="text-2xl font-bold mt-2 text-blue-600">R$ ${State.transacoes.reduce((a,c)=>c.tipo==='entrada'?a+c.valor:a-c.valor,0).toFixed(2)}</h3>
                        </div>
                        <div class="bg-white dark:bg-darkCard p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">OS Abertas</p>
                            <h3 class="text-2xl font-bold mt-2 text-orange-500">${State.os.filter(o => o.status === 'Aberta').length}</h3>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-darkCard p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm h-80">
                        <canvas id="chartDashboard"></canvas>
                    </div>`,
                clientes: () => `
                    <div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Clientes</h2> <button onclick="Actions.openForm('cliente')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">+ Novo Cliente</button> </div>
                    <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
                        <table class="w-full text-left"> <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"> <tr><th class="p-4">Nome</th><th class="p-4">CPF/CNPJ</th><th class="p-4 text-right">Ação</th></tr> </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.clientes.map(c=>`<tr><td class="p-4 font-bold">${c.nome}</td><td class="p-4">${c.cpfCnpj}</td><td class="p-4 text-right"><button onclick="Actions.deleteItem('clientes',${c.id})" class="text-red-400">🗑️</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center opacity-50">Nenhum cliente</td></tr>'}</tbody>
                        </table>
                    </div>`,
                produtos: () => `
                    <div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Produtos</h2> <button onclick="Actions.openForm('produto')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">+ Novo Produto</button> </div>
                    <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                        <table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"><tr><th class="p-4">Descrição</th><th class="p-4">Estoque</th><th class="p-4 text-right">Ação</th></tr></thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.produtos.map(p=>`<tr><td class="p-4 font-bold">${p.nome}</td><td class="p-4 ${p.estoqueAtual < (p.estoqueMinimo||5) ? 'text-red-500 font-bold' : ''}">${p.estoqueAtual}</td><td class="p-4 text-right"><button onclick="Actions.deleteItem('produtos',${p.id})" class="text-red-400">🗑️</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center opacity-50">Nenhum produto</td></tr>'}</tbody></table>
                    </div>`,
                servicos: () => `
                    <div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Serviços</h2> <button onclick="Actions.openForm('servico')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">+ Novo Serviço</button> </div>
                    <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                        <table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"><tr><th class="p-4">Serviço</th><th class="p-4">Valor Padrão</th><th class="p-4 text-right">Ação</th></tr></thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">${State.servicos.map(s=>`<tr><td class="p-4 font-bold">${s.nome}</td><td class="p-4">R$ ${s.valorPadrao}</td><td class="p-4 text-right"><button onclick="Actions.deleteItem('servicos',${s.id})" class="text-red-400">🗑️</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center opacity-50">Nenhum serviço</td></tr>'}</tbody></table>
                    </div>`,
                os: () => `
                    <div class="flex justify-between mb-6"> <h2 class="text-2xl font-bold">Ordens de Serviço</h2> <button onclick="Actions.openForm('os')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">+ Abrir OS</button> </div>
                    <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                        <table class="w-full text-left"> <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase font-bold"> <tr> <th class="px-6 py-4">Nº OS</th> <th class="px-6 py-4">Cliente</th> <th class="px-6 py-4">Status</th> <th class="px-6 py-4 text-right">Ações</th> </tr> </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800"> ${State.os.map(o => `<tr> <td class="px-6 py-4 font-bold">#${o.id}</td> <td class="px-6 py-4">${State.clientes.find(c=>c.id==o.clienteId)?.nome || '---'}</td> <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${o.status=='Finalizada'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}">${o.status}</span></td> <td class="px-6 py-4 text-right flex justify-end gap-2"> ${o.status=='Aberta'?`<button onclick="Actions.finalizeOS(${o.id})" class="text-green-500">✅</button>`:''} <button onclick="Actions.printOS(${o.id})">🖨️</button><button onclick="Actions.deleteItem('os',${o.id})" class="text-red-400">🗑️</button> </td> </tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center opacity-50">Nenhuma OS</td></tr>'} </tbody> </table>
                    </div>`,
                financeiro: () => `
                    <div class="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm p-6"><h2 class="text-xl font-bold mb-4">Lançamentos Financeiros</h2>
                    <div class="space-y-2">${State.transacoes.map(t=>`<div class="flex justify-between p-3 border-b dark:border-slate-800"><span>${t.descricao}</span><span class="font-bold ${t.tipo=='entrada'?'text-green-500':'text-red-500'}">R$ ${t.valor.toFixed(2)}</span></div>`).join('') || '<p class="opacity-50 text-center py-4">Nenhum lançamento.</p>'}</div></div>`,
                config: () => `
                    <div class="bg-white dark:bg-darkCard p-8 rounded-3xl border border-slate-200 dark:border-slate-800">
                        <h2 class="text-xl font-bold mb-4">Configurações & Backup</h2>
                        <p class="mb-4 text-sm opacity-60">ID da Empresa SaaS: <b>${State.empresa_id}</b></p>
                        <div class="flex gap-4">
                            <button onclick="Service.syncData()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold">Forçar Sincronização</button>
                            <button onclick="DB.exportDatabase()" class="bg-slate-200 dark:bg-slate-700 px-6 py-3 rounded-2xl font-bold">Exportar Backup JSON</button>
                        </div>
                    </div>`
            }
        };

        const Actions = {
            async finalizeOS(id) { 
                try { 
                    await Service.finalizeOS(id); 
                    UI.toast("OS Finalizada!"); await Service.loadAllState(); UI.nav('os'); Service.syncData();
                } catch(e) { UI.toast(e, 'error'); } 
            },
            async deleteItem(s, id) { if (confirm("Excluir?")) { await DB.delete(s, id); await Service.loadAllState(); UI.nav(UI.currentView); } },
            openForm(type) {
                let h = "";
                if(type=='cliente') h = `<h2 class="text-xl font-bold mb-4">Novo Cliente</h2><input id="f-nome" placeholder="Nome" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="f-doc" placeholder="CPF/CNPJ" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.saveCliente()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>`;
                if(type=='produto') h = `<h2 class="text-xl font-bold mb-4">Novo Produto</h2><input id="f-nome" placeholder="Nome" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="f-estoque" type="number" placeholder="Estoque Inicial" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.saveProd()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>`;
                if(type=='servico') h = `<h2 class="text-xl font-bold mb-4">Novo Serviço</h2><input id="f-nome" placeholder="Nome do Serviço" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><input id="f-valor" type="number" placeholder="Valor Padrão R$" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><button onclick="Actions.saveServico()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>`;
                if(type=='os') {
                    this.tempOS = { prodId: null, qtd: 1 };
                    h = `<h2 class="text-xl font-bold mb-4">Abrir OS Simples</h2>
                    <select id="os-cliente" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-2"><option value="">Selecione o Cliente</option>${State.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select>
                    <select id="os-prod" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4"><option value="">Selecione um Produto</option>${State.produtos.map(p=>`<option value="${p.id}" data-preco="10">${p.nome} (Estoque: ${p.estoqueAtual})</option>`).join('')}</select>
                    <button onclick="Actions.saveOS()" class="w-full py-4 bg-blue-600 text-white rounded-2xl">Gerar OS</button>`;
                }
                UI.openModal(h);
            },
            async saveCliente() { 
                const obj = syncMetadata({ nome: document.getElementById('f-nome').value, cpfCnpj: document.getElementById('f-doc').value, status: 'ativo' });
                await DB.put("clientes", obj); UI.closeModal(); await Service.loadAllState(); UI.nav('clientes'); Service.syncData();
            },
            async saveProd() { 
                const obj = syncMetadata({ nome: document.getElementById('f-nome').value, estoqueAtual: parseInt(document.getElementById('f-estoque').value||0), precoVenda: 10, estoqueMinimo: 5 });
                await DB.put("produtos", obj); UI.closeModal(); await Service.loadAllState(); UI.nav('produtos'); Service.syncData();
            },
            async saveServico() { 
                const obj = syncMetadata({ nome: document.getElementById('f-nome').value, valorPadrao: parseFloat(document.getElementById('f-valor').value||0) });
                await DB.put("servicos", obj); UI.closeModal(); await Service.loadAllState(); UI.nav('servicos'); Service.syncData();
            },
            async saveOS() {
                if (window._processingOS) return;
                window._processingOS = true;
                try {
                    const cid = parseInt(document.getElementById('os-cliente').value);
                    const pid = parseInt(document.getElementById('os-prod').value);
                    if(!cid || !pid) throw "Selecione cliente e produto";
                    
                    const prod = State.produtos.find(p=>p.id===pid);
                    const os = syncMetadata({
                        clienteId: cid, dataAbertura: Date.now(), status: 'Aberta', 
                        itensProdutos: [{id: prod.id, nome: prod.nome, qtd: 1, preco: prod.precoVenda}], itensServicos: [], total: prod.precoVenda
                    });
                    
                    await DB.put("os", os); UI.closeModal(); await Service.loadAllState(); UI.nav('os'); Service.syncData();
                } catch(e) { UI.toast(e, "error"); } finally { window._processingOS = false; }
            },
            printOS(id) {
                if (window._printing) return;
                window._printing = true;
                const os = State.os.find(o => o.id == id);
                const cli = State.clientes.find(c => c.id == os.clienteId);
                const area = document.getElementById('print-area');
                
                const pad = (s, l) => s.toString().substring(0, l).padEnd(l, ' ');
                let txt = `            UMX GESTAO v3.4             \n----------------------------------------\nOS NUMERO: #${pad(os.id, 28)}\nDATA: ${pad(new Date(os.dataAbertura).toLocaleDateString(), 32)}\nCLIENTE: ${pad(cli ? cli.nome : 'CONSUMIDOR', 31)}\n----------------------------------------\nITEM             QTD       VALOR (RS)   \n`;
                (os.itensProdutos||[]).forEach(p => { txt += `${pad(p.nome, 16)} ${pad(p.qtd, 4)} ${pad(p.preco.toFixed(2), 12)}\n`; });
                txt += `----------------------------------------\nTOTAL: ${os.total.toFixed(2).padStart(33, ' ')}\n----------------------------------------\n`;
                
                area.innerHTML = `<pre style="font-family:'Courier New', monospace; font-size:12px;">${txt}</pre>`;
                window.print();
                setTimeout(() => window._printing = false, 2000);
            }
        };

        document.addEventListener('DOMContentLoaded', () => UI.init());
    </script>
</body>
</html>
